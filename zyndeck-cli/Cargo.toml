[dependencies]
clap.workspace = true
uuid.workspace = true
zyndeck-core.workspace = true
zyndeck-db.workspace = true
tokio.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
anyhow.workspace = true
